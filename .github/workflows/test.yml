name: Run tests

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          # Erlang 24 & 25: Test MongoDB 5.0 and 6.0 (use older Debian with libssl1.1)
          - erlang: 24
            mongodb: "5.0.2"
          - erlang: 24
            mongodb: "6.0.16"
          - erlang: 25
            mongodb: "5.0.2"
          - erlang: 25
            mongodb: "6.0.16"
          # Erlang 26: Test MongoDB 6.0 and 7.0 (Debian Bookworm, uses Ubuntu packages with libssl3)
          - erlang: 26
            mongodb: "6.0.16"
          - erlang: 26
            mongodb: "7.0.12"
    container:
      image: erlang:${{ matrix.erlang }}
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/install_mongo_debian.sh ${{ matrix.mongodb }}
      - run: ./scripts/start_mongo_single_node.sh
      - run: ./scripts/start_mongo_cluster.sh
      - run: ./scripts/start_mongo_auth.sh
      - run: ./rebar3 eunit
      - run: ./rebar3 ct
      - name: Archive Replica Set Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: erlang-${{ matrix.erlang }}-mongodb-${{ matrix.mongodb }}-mongodb_replica_set_logs
          path: rs0-logs
          retention-days: 1
      - name: Archive Single Node Log
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: erlang-${{ matrix.erlang }}-mongodb-${{ matrix.mongodb }}-single_node.log
          path: single_node.log
          retention-days: 1
      - name: CT Logs
        uses: actions/upload-artifact@v4
        with:
          name: erlang-${{ matrix.erlang }}-mongodb-${{ matrix.mongodb }}-ct_logs
          path: _build/test/logs/
          retention-days: 5

  buildinfo_auth_regression:
    runs-on: ubuntu-24.04
    container:
      image: erlang:26
    services:
      mongo82:
        image: mongo:8.2.5
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin
          MONGO_INITDB_DATABASE: admin
        options: >-
          --health-cmd "mongosh mongodb://admin:admin@localhost:27017/admin?authSource=admin --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 15s
    steps:
      - uses: actions/checkout@v4
      - run: ./rebar3 ct --suite=test/buildinfo_auth_SUITE.erl --suite=test/op_msg_auth_source_SUITE.erl
        env:
          MONGO_AUTH_HOST: mongo82
          MONGO_AUTH_PORT: "27017"
          MONGO_AUTH_USER: admin
          MONGO_AUTH_PASSWORD: admin
      - name: CT Logs
        uses: actions/upload-artifact@v4
        with:
          name: mongodb-8.2.5-auth-buildinfo-regression-ct_logs
          path: _build/test/logs/
          retention-days: 5
